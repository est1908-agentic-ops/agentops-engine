name: Publish engine-sdk

# Tag-triggered release of the public @agentic-ops/engine-sdk package. The SDK
# is a semver-versioned library (its EngineActivities + ENGINE_QUEUE surface is
# a compatibility contract consumers pin to), so publishing is a deliberate,
# tagged act — not a side effect of merging to main (unlike the SHA-tagged
# engine images in ci.yaml). Tag prefix is package-scoped so a second
# publishable package can get its own release trigger later.
on:
  push:
    tags: ['engine-sdk-v*'] # e.g. engine-sdk-v0.2.0

jobs:
  publish:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Self-hosted runners share $HOME; namespace by runner (same as ci.yaml).
      - uses: pnpm/action-setup@v4
        with:
          dest: ~/setup-pnpm-${{ runner.name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org # writes the authed .npmrc

      - run: pnpm install --frozen-lockfile

      # The tag must match the package.json version, or we'd publish a lie.
      - name: Verify tag matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#engine-sdk-v}"
          PKG_VERSION="$(node -p "require('./packages/engine-sdk/package.json').version")"
          echo "tag=$TAG_VERSION pkg=$PKG_VERSION"
          [ "$TAG_VERSION" = "$PKG_VERSION" ] || { echo "::error::tag $TAG_VERSION != package.json $PKG_VERSION"; exit 1; }

      - run: pnpm --filter @agentic-ops/engine-sdk build

      # Run the SDK's tests through the root vitest config (which holds the
      # @agentops/* -> src aliases and the correct root). `pnpm --filter … test`
      # would set vitest's root to the package dir, where the root config's
      # `packages/*/src/**` globs match nothing ("No test files found").
      - run: pnpm test -- packages/engine-sdk

      # TEMPORARY DIAGNOSTIC — IPv4 vs IPv6 egress + which family reaches npm.
      - name: Diagnose egress family (temporary)
        run: |
          echo "IPv4 egress: $(curl -4 -s https://api.ipify.org || echo none)"
          echo "IPv6 egress: $(curl -6 -s https://api64.ipify.org || echo none)"
          echo "npm registry connection (server ip shows family used):"
          curl -sS -o /dev/null -w '  remote_ip=%{remote_ip}\n' https://registry.npmjs.org/ || true

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # No --provenance: npm provenance requires a public source repo, and
        # agentops-engine is private. The published package is still public.
        run: pnpm --filter @agentic-ops/engine-sdk publish --no-git-checks --access public
