name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm test:policies-coverage

      - run: pnpm e2e

      - uses: azure/setup-helm@v4
        with:
          version: v4.2.2

      - run: helm lint charts/engine

      - run: bash charts/engine/tests/run.sh

  build-images:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # secrets.GITHUB_TOKEN is the Actions-provided token (scoped by this
      # job's permissions: packages: write) — unrelated to the engine's own
      # live-mode GITHUB_TOKEN env var.
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/worker/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/worker:${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: images/agent-claude
          file: images/agent-claude/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/agent-claude:${{ github.sha }}
