name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm test:policies-coverage

      - run: pnpm e2e

      - uses: azure/setup-helm@v4
        with:
          version: v4.2.2

      - run: helm lint charts/engine

      - run: bash charts/engine/tests/run.sh

  build-images:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: gitactions.est1908.top
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/worker/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: gitactions.est1908.top/agentic-ops/worker:${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: images/agent-claude
          file: images/agent-claude/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: gitactions.est1908.top/agentic-ops/agent-claude:${{ github.sha }}

      - uses: azure/setup-helm@v4
        with:
          version: v4.2.2

      - name: Package and push the engine chart (OCI)
        if: github.ref == 'refs/heads/main'
        run: |
          helm registry login gitactions.est1908.top \
            -u "${{ secrets.REGISTRY_USERNAME }}" -p "${{ secrets.REGISTRY_PASSWORD }}"
          helm package charts/engine \
            --version "0.0.0-${{ github.sha }}" \
            --app-version "${{ github.sha }}" \
            --destination /tmp/chart
          helm push "/tmp/chart/engine-0.0.0-${{ github.sha }}.tgz" \
            oci://gitactions.est1908.top/agentic-ops

  bump-platform:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: flair-hr/agentops-platform
          ssh-key: ${{ secrets.PLATFORM_DEPLOY_KEY }}
          path: platform

      - name: Bump engine image tags in platform GitOps
        env:
          ENGINE_SHA: ${{ github.sha }}
          PLATFORM_DIR: platform
        run: bash scripts/bump-platform-engine-tags.sh
