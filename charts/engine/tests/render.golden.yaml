# Source: engine/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-worker
  namespace: dev-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-worker
  template:
    metadata:
      labels:
        app: engine-worker
    spec:
      # Must cover the longest startToCloseTimeout any workflow gives runAgent
      # (45m, whitebox-bughunt.ts) -- otherwise k8s SIGKILLs this pod on a
      # rollout before Worker.run()'s graceful SIGTERM drain (stop polling,
      # let in-flight activities finish) can complete, forcing a spurious
      # Temporal heartbeat-timeout retry. Only effective together with the
      # `pnpm exec` CMD in images/engine/Dockerfile, which is what lets
      # SIGTERM reach that handler in the first place (plain `pnpm run start`
      # swallows it).
      terminationGracePeriodSeconds: 2700
      serviceAccountName: engine-worker
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: worker
          image: "gitactions.est1908.top/agentic-ops/worker:CHANGEME"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: TEMPORAL_ADDRESS
              value: "localhost:7233"
            - name: TEMPORAL_NAMESPACE
              value: "dev-agents"
            - name: AGENT_NAMESPACE
              value: "dev-agents"
            - name: WORKSPACE_PVC_NAME
              value: "workspace-tasks"
            - name: WORKSPACE_MOUNT_PATH
              value: "/workspace/tasks"
            - name: CACHE_PVC_NAME
              value: "workspace-cache"
            - name: CACHE_MOUNT_PATH
              value: "/workspace/cache"
            - name: AGENT_RUNNER_IMAGE
              value: "gitactions.est1908.top/agentic-ops/agent-runner:CHANGEME"
            - name: AGENT_RUNNER_UID
              value: "1000"
            - name: CLAUDE_AUTH_SECRET_NAME
              value: "claude-credentials"
            - name: PI_AUTH_SECRET_NAME
              value: "pi-credentials"
            - name: PLATFORM_AGENT_SERVICE_ACCOUNT
              value: "engine-platform-agent"
            - name: IMAGE_PULL_SECRET_NAME
              value: "registry-credentials"
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: workspace-tasks
              mountPath: /workspace/tasks
            - name: workspace-cache
              mountPath: /workspace/cache
      volumes:
        - name: workspace-tasks
          persistentVolumeClaim:
            claimName: workspace-tasks
        - name: workspace-cache
          persistentVolumeClaim:
            claimName: workspace-cache

