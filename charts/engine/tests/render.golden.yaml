---
# Source: engine/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-worker
  namespace: dev-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-worker
  template:
    metadata:
      labels:
        app: engine-worker
    spec:
      serviceAccountName: engine-worker
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: worker
          image: "gitactions.est1908.top/agentic-ops/worker:CHANGEME"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: TEMPORAL_ADDRESS
              value: "localhost:7233"
            - name: TEMPORAL_NAMESPACE
              value: "dev-agents"
            - name: AGENT_NAMESPACE
              value: "dev-agents"
            - name: WORKSPACE_PVC_NAME
              value: "workspace-tasks"
            - name: WORKSPACE_MOUNT_PATH
              value: "/workspace/tasks"
            - name: AGENT_RUNNER_IMAGE
              value: "gitactions.est1908.top/agentic-ops/agent-runner:CHANGEME"
            - name: AGENT_RUNNER_UID
              value: "1000"
            - name: PROJECT_REGISTRY_JSON
              value: "[]"
            - name: CLAUDE_AUTH_SECRET_NAME
              value: "claude-credentials"
            - name: PI_AUTH_SECRET_NAME
              value: "pi-credentials"
            - name: IMAGE_PULL_SECRET_NAME
              value: "registry-credentials"
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: workspace-tasks
              mountPath: /workspace/tasks
            - name: workspace-cache
              mountPath: /workspace/cache
      volumes:
        - name: workspace-tasks
          persistentVolumeClaim:
            claimName: workspace-tasks
        - name: workspace-cache
          persistentVolumeClaim:
            claimName: workspace-cache

---
# Source: engine/templates/gateway-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-gateway
  namespace: dev-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-gateway
  template:
    metadata:
      labels:
        app: engine-gateway
    spec:
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: gateway
          image: "gitactions.est1908.top/agentic-ops/gateway:CHANGEME"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: TEMPORAL_ADDRESS
              value: "localhost:7233"
            - name: TEMPORAL_NAMESPACE
              value: "dev-agents"
            - name: TRIGGER_LABEL
              value: "agentops"
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-webhook-secret
                  key: GITHUB_WEBHOOK_SECRET
            - name: PROJECT_REGISTRY_JSON
              value: "[]"
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
