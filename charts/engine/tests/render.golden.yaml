---
# Source: engine/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: engine-worker
  namespace: dev-agents

---
# Source: engine/templates/pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workspace-tasks
  namespace: dev-agents
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
# Source: engine/templates/pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workspace-cache
  namespace: dev-agents
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi

---
# Source: engine/templates/role.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: engine-agent-jobs
  namespace: dev-agents
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

---
# Source: engine/templates/rolebinding.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: engine-agent-jobs
  namespace: dev-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: engine-agent-jobs
subjects:
  - kind: ServiceAccount
    name: engine-worker
    namespace: dev-agents

---
# Source: engine/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-worker
  namespace: dev-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-worker
  template:
    metadata:
      labels:
        app: engine-worker
    spec:
      serviceAccountName: engine-worker
      securityContext:
        runAsNonRoot: true
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: worker
          image: "gitactions.est1908.top/agentic-ops/worker:CHANGEME"
          imagePullPolicy: IfNotPresent
          env:
            - name: TEMPORAL_ADDRESS
              value: "localhost:7233"
            - name: AGENT_NAMESPACE
              value: "dev-agents"
            - name: WORKSPACE_PVC_NAME
              value: "workspace-tasks"
            - name: WORKSPACE_MOUNT_PATH
              value: "/workspace/tasks"
            - name: AGENT_RUNNER_IMAGE
              value: "gitactions.est1908.top/agentic-ops/agent-claude:CHANGEME"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: GITHUB_TOKEN
            - name: CLAUDE_AUTH_SECRET_NAME
              value: "claude-credentials"
            - name: IMAGE_PULL_SECRET_NAME
              value: "registry-credentials"
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: workspace-tasks
              mountPath: /workspace/tasks
            - name: workspace-cache
              mountPath: /workspace/cache
      volumes:
        - name: workspace-tasks
          persistentVolumeClaim:
            claimName: workspace-tasks
        - name: workspace-cache
          persistentVolumeClaim:
            claimName: workspace-cache
