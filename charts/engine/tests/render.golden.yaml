# Source: engine/templates/gateway-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-gateway
  namespace: dev-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-gateway
  template:
    metadata:
      labels:
        app: engine-gateway
    spec:
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: gateway
          image: "gitactions.est1908.top/agentic-ops/gateway:CHANGEME"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: TEMPORAL_ADDRESS
              value: "localhost:7233"
            - name: TEMPORAL_NAMESPACE
              value: "dev-agents"
            - name: TRIGGER_LABEL
              value: "agentops"
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-webhook-secret
                  key: GITHUB_WEBHOOK_SECRET
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          # Same cold-start profile as control (tsx boot): give startup up to
          # 150s before the liveness probe can kill it, so a slow boot under
          # rollout contention doesn't turn into a CrashLoopBackOff.
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
