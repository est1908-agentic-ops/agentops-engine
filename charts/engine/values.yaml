namespace: dev-agents

image:
  repository: gitactions.est1908.top/agentic-ops
  workerTag: CHANGEME
  # One shared image runs every agent-CLI backend (claude, pi, ...) — see
  # images/agent-runner/Dockerfile and ARCHITECTURE.md §5.4.
  agentRunnerTag: CHANGEME
  gatewayTag: CHANGEME
  controlTag: CHANGEME
  pullPolicy: IfNotPresent

imagePullSecretName: registry-credentials

replicas: 1

# See charts/engine/templates/deployment.yaml's terminationGracePeriodSeconds
# comment -- 2700s (45m) matches the longest runAgent startToCloseTimeout any
# workflow proxies (whitebox-bughunt.ts).
terminationGracePeriodSeconds: 2700

temporalAddress: "localhost:7233"

# Empty by default -- same "chart ships no cluster assumption" pattern as
# otelExporterOtlpEndpoint below. agentops-platform's values override sets
# the real Temporal Web UI host once one exists for the cluster.
temporalUiBaseUrl: ""

# Empty by default -- this chart ships no assumption about whether a cluster
# has the observability stack (M4 sub-project 1, agentops-platform). Set by
# agentops-platform's values override once Alloy is deployed there, same
# pattern temporalAddress uses for a fixed in-cluster DNS name.
otelExporterOtlpEndpoint: ""

# Host empty by default -- same "chart ships no cluster assumption" pattern as
# otelExporterOtlpEndpoint above. agentops-platform's values override sets
# the real host once the agentops_engine database exists there.
# Password comes from the same postgres-credentials secret Temporal already
# uses (shared Postgres instance, separate database, per ARCHITECTURE.md §5.2).
# Named after the engine, not "agent_run_stats" -- it also holds
# managed_projects (see docs/superpowers/specs/2026-07-08-managed-project-registry-design.md).
engineDb:
  host: ""
  port: "5432"
  name: agentops_engine
  user: temporal
  passwordSecretName: postgres-credentials

# Base64 PKCS8 DER private key for decrypting managed-project credentials
# (docs/superpowers/specs/2026-07-08-managed-project-registry-design.md §5).
# This -- together with engineDb.host above -- is the *only* project
# registration mechanism now (the static PROJECT_REGISTRY_JSON registry was
# removed; see docs/superpowers/specs/2026-07-09-linear-trigger-design.md's
# DB-only addendum). Unset means the worker/gateway/cli have nothing
# registered anywhere. Generate with credential-crypto's
# generateManagedProjectKeyPair() and store the private half SOPS-encrypted.
projectCredentialPrivateKeySecretName: ""

# Base64 SPKI DER public key matching projectCredentialPrivateKeySecretName's
# private half (design §5). NOT a secret -- mounted as a plain env var on
# control ONLY, which can encrypt managed-project tokens it cannot decrypt.
# The private key never reaches control. Generate with
# generateManagedProjectKeyPair(); unset => control's /api/projects routes
# are disabled (503). The platform follow-up PR sets this to the live key
# (private key is already wired in agentops-platform PR #3).
projectCredentialPublicKey: ""

# Shared bearer token gating control's /api/projects CRUD routes
# (CONTROL_CRUD_TOKEN). A SECRET -- sourced from a K8s Secret with a
# controlCrudToken key. Unset => routes disabled (503). This is app-layer
# defense-in-depth + the local CLI's auth; GitHub issue #4 (Traefik
# basic-auth on the control ingress) is STILL REQUIRED before enabling the
# control ingress publicly (control.ingress.enabled stays false by default).
projectCrudTokenSecretName: ""

taskQueue: agentops-devcycle

# Per ARCHITECTURE.md §5.2/§6: dev-agents/prod-agents each get a separate
# Temporal namespace so testing the platform can't fire real hotfixes.
# Defaults to the same name as the k8s namespace above for that reason.
# Auto-provisioned by a pre-install/pre-upgrade Helm hook Job (see
# templates/temporal-namespace-job.yaml) since Temporal doesn't create
# custom namespaces on its own.
temporal:
  namespace: dev-agents
  retention: 72h
  adminToolsImage: temporalio/admin-tools:1.31.1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

agentRunnerUid: 1000

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

workspace:
  pvcName: workspace-tasks
  mountPath: /workspace/tasks
  cachePvcName: workspace-cache
  cacheMountPath: /workspace/cache
  storageClassName: local-path
  taskSize: 10Gi
  cacheSize: 20Gi

claudeAuthSecretName: claude-credentials
piAuthSecretName: pi-credentials

# Empty by default -- same "chart ships no cluster assumption" pattern as
# otelExporterOtlpEndpoint above. Unset means RateLimitFallbackBackend is a
# passthrough no-op (packages/worker/src/main.ts's wrapWithRateLimitFallback),
# same "off by default" convention as the PI_RATE_WINDOW_* vars. See
# docs/superpowers/specs/2026-07-08-provider-rate-limit-fallback-design.md's
# "open questions" -- deliberately left operator-set with no chart default
# rather than a guessed value.
piRateLimitFallbackModel: ""

# The platform role
# needs credentials devCycle's claude/pi Jobs don't: Temporal REST/action creds
# and Grafana basic auth, bundled by agentops-platform into one Secret with
# whatever keys the platform-ops skill's toolbelt expects (TEMPORAL_HOST,
# GRAFANA_HOST, GRAFANA_USER, GRAFANA_PASSWORD). Empty by default -- same
# "chart ships no cluster assumption" pattern as otelExporterOtlpEndpoint.
platformAgentSecretName: ""

gateway:
  port: 3000
  triggerLabel: agentops
  # Secret must contain a GITHUB_WEBHOOK_SECRET key — the shared secret
  # configured on each registered repo's GitHub webhook (Settings > Webhooks).
  webhookSecretName: gateway-webhook-secret
  # Empty by default -- unset means the /webhooks/linear route 404s entirely
  # (packages/gateway/src/main.ts), same "chart ships no cluster assumption"
  # pattern as piRateLimitFallbackModel above. Secret must contain a
  # LINEAR_WEBHOOK_SECRET key -- the shared secret configured on the Linear
  # workspace's webhook, once a `projects` entry sets `trackerType: linear`.
  linearWebhookSecretName: ""
  # Empty by default -- unset means the ArgoCD project-workers plugin-generator
  # route (POST /api/v1/getparams.execute) 404s (feature off), same pattern as
  # linearWebhookSecretName. agentops-platform sets this + creates the matching
  # Secret (key ARGOCD_PLUGIN_TOKEN) when it swaps the project-workers
  # ApplicationSet to the plugin generator (project-worker-onboarding spec §5.2).
  argocdPluginTokenSecretName: ""
  # Disabled by default: this chart ships no real public hostname.
  # agentops-platform's values override sets host + enabled: true once a real
  # domain is pointed at the cluster. clusterIssuer must be a cert-manager
  # ClusterIssuer using a publicly-trusted CA (Let's Encrypt) — step-ca's
  # internal-only CA is not trusted by GitHub's webhook delivery.
  ingress:
    enabled: false
    host: ""
    clusterIssuer: letsencrypt
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

control:
  port: 3001
  # Disabled by default, same reasoning as gateway.ingress -- this chart
  # ships no real public hostname.
  ingress:
    enabled: false
    host: ""
    clusterIssuer: letsencrypt
    # Name of a Traefik basicAuth Middleware (CRD) deployed platform-side to
    # guard the public control ingress. Empty => no middleware attached.
    # agentops-platform sets this to control-basic-auth (issue #4).
    basicAuthSecretName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
