{{- if and .Values.control.ingress.enabled .Values.temporalUiBaseUrl }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-control
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.control.ingress.clusterIssuer }}
    {{- if .Values.control.ingress.basicAuthSecretName }}
    # Traefik middleware attachment (namespace-name@kubernetescrd). The
    # Middleware CRD + its htpasswd Secret are platform-side (agentops-platform
    # engine-secrets), not in this chart -- guards the public control ingress
    # (GitHub issue #4). Empty => no auth middleware (ingress stays open).
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.namespace }}-{{ .Values.control.ingress.basicAuthSecretName }}@kubernetescrd
    {{- end }}
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.control.ingress.host | quote }}
      secretName: {{ .Release.Name }}-control-tls
  rules:
    - host: {{ .Values.control.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-control
                port:
                  number: {{ .Values.control.port }}
{{- end }}
