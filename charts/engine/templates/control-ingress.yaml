{{- if and .Values.control.ingress.enabled .Values.temporalUiBaseUrl }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-control
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.control.ingress.clusterIssuer }}
    {{- if .Values.control.ingress.basicAuth.htpasswdSecretName }}
    # Chart-managed Traefik basicAuth Middleware (control-middleware.yaml)
    # validates Authorization: Basic against an external htpasswd Secret.
    # Empty secret name => no middleware attached (ingress stays open).
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.namespace }}-{{ .Release.Name }}-control-basic-auth@kubernetescrd
    {{- end }}
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.control.ingress.host | quote }}
      secretName: {{ .Release.Name }}-control-tls
  rules:
    - host: {{ .Values.control.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-control
                port:
                  number: {{ .Values.control.port }}
{{- end }}
