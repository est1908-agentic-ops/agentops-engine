apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-worker
    spec:
      serviceAccountName: {{ .Release.Name }}-worker
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretName }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}/worker:{{ .Values.image.workerTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.temporalAddress | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            - name: AGENT_NAMESPACE
              value: {{ .Values.namespace | quote }}
            - name: WORKSPACE_PVC_NAME
              value: {{ .Values.workspace.pvcName | quote }}
            - name: WORKSPACE_MOUNT_PATH
              value: {{ .Values.workspace.mountPath | quote }}
            - name: AGENT_RUNNER_IMAGE
              value: "{{ .Values.image.repository }}/agent-runner:{{ .Values.image.agentRunnerTag }}"
            - name: AGENT_RUNNER_UID
              value: {{ .Values.agentRunnerUid | quote }}
            {{- range $project, $cfg := .Values.projects }}
            - name: {{ printf "GITHUB_TOKEN__%s" (upper (replace "-" "_" $project)) }}
              valueFrom:
                secretKeyRef:
                  name: {{ $cfg.githubTokenSecretName }}
                  key: GITHUB_TOKEN
            {{- end }}
            - name: PROJECT_REGISTRY_JSON
              value: {{ include "engine.projectRegistryJson" . | quote }}
            - name: CLAUDE_AUTH_SECRET_NAME
              value: {{ .Values.claudeAuthSecretName | quote }}
            - name: PI_AUTH_SECRET_NAME
              value: {{ .Values.piAuthSecretName | quote }}
            {{- if .Values.piRateLimitFallbackModel }}
            - name: PI_RATE_LIMIT_FALLBACK_MODEL
              value: {{ .Values.piRateLimitFallbackModel | quote }}
            {{- end }}
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.litellmApiKeySecretName }}
                  key: {{ .Values.litellmApiKeySecretKey }}
            - name: PLATFORM_AGENT_SERVICE_ACCOUNT
              value: {{ printf "%s-platform-agent" .Release.Name | quote }}
            {{- if .Values.platformAgentSecretName }}
            - name: PLATFORM_AGENT_SECRET_NAME
              value: {{ .Values.platformAgentSecretName | quote }}
            {{- end }}
            - name: IMAGE_PULL_SECRET_NAME
              value: {{ .Values.imagePullSecretName | quote }}
            {{- if .Values.otelExporterOtlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otelExporterOtlpEndpoint | quote }}
            {{- end }}
            {{- if .Values.engineDb.host }}
            - name: ENGINE_DB_HOST
              value: {{ .Values.engineDb.host | quote }}
            - name: ENGINE_DB_PORT
              value: {{ .Values.engineDb.port | quote }}
            - name: ENGINE_DB_NAME
              value: {{ .Values.engineDb.name | quote }}
            - name: ENGINE_DB_USER
              value: {{ .Values.engineDb.user | quote }}
            - name: ENGINE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.engineDb.passwordSecretName }}
                  key: password
            {{- if .Values.projectCredentialPrivateKeySecretName }}
            - name: PROJECT_CREDENTIAL_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.projectCredentialPrivateKeySecretName }}
                  key: privateKey
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: workspace-tasks
              mountPath: {{ .Values.workspace.mountPath }}
            - name: workspace-cache
              mountPath: {{ .Values.workspace.cacheMountPath }}
      volumes:
        - name: workspace-tasks
          persistentVolumeClaim:
            claimName: {{ .Values.workspace.pvcName }}
        - name: workspace-cache
          persistentVolumeClaim:
            claimName: {{ .Values.workspace.cachePvcName }}
