apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-platform-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-platform-agent
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-platform-agent
    namespace: {{ .Values.namespace }}
