{{- if .Values.temporalUiBaseUrl }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-control
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-control
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-control
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretName }}
      containers:
        - name: control
          image: "{{ .Values.image.repository }}/control:{{ .Values.image.controlTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.control.port }}
          env:
            - name: PORT
              value: {{ .Values.control.port | quote }}
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.temporalAddress | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            - name: TASK_QUEUE
              value: {{ .Values.taskQueue | quote }}
            - name: TEMPORAL_UI_BASE_URL
              value: {{ .Values.temporalUiBaseUrl | quote }}
            {{- if .Values.engineDb.host }}
            - name: ENGINE_DB_HOST
              value: {{ .Values.engineDb.host | quote }}
            - name: ENGINE_DB_PORT
              value: {{ .Values.engineDb.port | quote }}
            - name: ENGINE_DB_NAME
              value: {{ .Values.engineDb.name | quote }}
            - name: ENGINE_DB_USER
              value: {{ .Values.engineDb.user | quote }}
            - name: ENGINE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.engineDb.passwordSecretName }}
                  key: password
            {{- end }}
            {{- if .Values.projectCredentialPublicKey }}
            - name: PROJECT_CREDENTIAL_PUBLIC_KEY
              value: {{ .Values.projectCredentialPublicKey | quote }}
            {{- end }}
            {{- if .Values.projectCrudTokenSecretName }}
            - name: CONTROL_CRUD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.projectCrudTokenSecretName }}
                  key: controlCrudToken
            {{- end }}
          resources:
            {{- toYaml .Values.control.resources | nindent 12 }}
          # The console image bundles a Vite SPA and boots via `tsx src/main.ts`,
          # so cold start needs ~25s+ (more under rollout memory contention) to
          # bind :{{ .Values.control.port }}. Without a startupProbe the default
          # liveness probe (initialDelay 0, period 10, threshold 3) kills the
          # container ~30s in, before it ever serves -- a CrashLoopBackOff that
          # never lets a new pod reach Ready. The startupProbe gives boot up to
          # 150s before liveness takes over.
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.control.port }}
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.control.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.control.port }}
{{- end }}
