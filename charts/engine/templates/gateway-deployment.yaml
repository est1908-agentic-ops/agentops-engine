apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-gateway
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-gateway
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretName }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}/gateway:{{ .Values.image.gatewayTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
          env:
            - name: PORT
              value: {{ .Values.gateway.port | quote }}
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.temporalAddress | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            - name: TRIGGER_LABEL
              value: {{ .Values.gateway.triggerLabel | quote }}
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.webhookSecretName }}
                  key: GITHUB_WEBHOOK_SECRET
            {{- if .Values.gateway.linearWebhookSecretName }}
            - name: LINEAR_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.linearWebhookSecretName }}
                  key: LINEAR_WEBHOOK_SECRET
            {{- end }}
            {{- if .Values.engineDb.host }}
            - name: ENGINE_DB_HOST
              value: {{ .Values.engineDb.host | quote }}
            - name: ENGINE_DB_PORT
              value: {{ .Values.engineDb.port | quote }}
            - name: ENGINE_DB_NAME
              value: {{ .Values.engineDb.name | quote }}
            - name: ENGINE_DB_USER
              value: {{ .Values.engineDb.user | quote }}
            - name: ENGINE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.engineDb.passwordSecretName }}
                  key: password
            {{- end }}
            {{- if .Values.projectCredentialPrivateKeySecretName }}
            - name: PROJECT_CREDENTIAL_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.projectCredentialPrivateKeySecretName }}
                  key: privateKey
            {{- end }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          # Same cold-start profile as control (tsx boot): give startup up to
          # 150s before the liveness probe can kill it, so a slow boot under
          # rollout contention doesn't turn into a CrashLoopBackOff.
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.port }}
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.port }}
